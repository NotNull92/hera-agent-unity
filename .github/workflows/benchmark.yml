name: Benchmark

on:
  # Manual trigger only — requires a running Unity Editor with the Connector package.
  # GitHub-hosted runners do not have Unity installed, so this workflow is intended
  # for self-hosted runners or local machines with Unity.
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of runs per scenario (default: 20)'
        required: false
        default: '20'

jobs:
  benchmark:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Install hyperfine
        run: brew install hyperfine

      - name: Build CLI
        run: go build -o hera-agent-unity-unity .

      - name: Run benchmarks
        run: ./scripts/benchmark.sh
        env:
          HYPERFINE_RUNS: ${{ github.event.inputs.runs }}

      - name: Upload results
        uses: actions/upload-artifact@v5
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results/
