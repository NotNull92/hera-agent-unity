name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Generate Windows resource (icon + versioninfo)
        if: matrix.goos == 'windows'
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
          python3 - <<PY
          import json
          v = "${VERSION}"
          maj, mn, pat = int("${MAJ}"), int("${MIN}"), int("${PAT}")
          with open("versioninfo.json") as f: d = json.load(f)
          d["FixedFileInfo"]["FileVersion"] = {"Major": maj, "Minor": mn, "Patch": pat, "Build": 0}
          d["FixedFileInfo"]["ProductVersion"] = {"Major": maj, "Minor": mn, "Patch": pat, "Build": 0}
          d["StringFileInfo"]["FileVersion"] = v
          d["StringFileInfo"]["ProductVersion"] = v
          with open("versioninfo.json", "w") as f: json.dump(d, f, indent=2)
          PY
          goversioninfo -64 -o resource_windows_amd64.syso versioninfo.json

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o "hera-agent-unity-${GOOS}-${GOARCH}${EXT}" .

      - uses: actions/upload-artifact@v4
        with:
          name: hera-agent-unity-${{ matrix.goos }}-${{ matrix.goarch }}
          path: hera-agent-unity-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: hera-agent-unity-*
